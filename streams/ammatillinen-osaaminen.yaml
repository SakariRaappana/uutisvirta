name: "Ammatillinen osaaminen"
slug: ammatillinen-osaaminen

# Lukijaprofiili — tämä teksti välitetään suoraan LLM:lle. Muokkaa vapaasti
# luonnollisella kielellä kuvaamaan omaa taustaasi ja kiinnostuksesi kohdetta.
profile: |
  Olen Data Science -konsultti finanssialalla Suomessa. Rakennan tekoälyagentteja
  finanssisektorille. Seuraan aktiivisesti Azure-ekosysteemiä: erityisesti
  Microsoft Agent Frameworkia (MAF) ja Azure AI Foundrya. MAF ja Foundry ovat
  molemmat nopeasti kehittyviä ympäristöjä — seuraan erityisesti mitä
  ominaisuuksia siirtyy Preview-tilasta GA-tilaan, ja mitä arkkitehtuurillisia
  muutoksia Microsoftilta tulee. Olen myös kiinnostunut Microsoft Purview'sta
  AI-datagovernancea varten.

  Microsoftin ekosysteemin lisäksi olen kiinnostunut yleisesti tekoälyagenttien
  arkkitehtuurista: miten eri agenttiframeworkit toimivat, miten agentit
  kommunikoivat keskenään (MCP, A2A), mitä uusia malleja tai tutkimustuloksia
  ilmestyy.

  Vaatimustenmukaisuusnäkökulma on tärkeä: EU AI Act, GDPR ja finanssialan
  erityissääntelyä koskevat päivitykset. Haluan pysyä kartalla siitä, mitä
  compliance-vaatimuksia tulee voimaan ja milloin.

  Pohdin myös omaa urakehitystäni: miten AI-konsultin rooli kehittyy lähivuosina,
  mitä teknologioita ja taitoja kannattaa opiskella, miten lisätä omaa arvoa
  neuvottelupöydässä.

  Olen Python-ohjelmoija joka ymmärtää neuroverkkojen matematiikan syvällisesti.
  En halua yksinkertaista tekoälyjargonia ja ympäripyöreitä lupauksia — haluan ymmärtää arkkitehtuurilliset
  perusteet ja strategisen kokonaiskuvan.

