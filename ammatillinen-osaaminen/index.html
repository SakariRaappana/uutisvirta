<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ammatillinen osaaminen — Uutisvirta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F0F1EB;
      --surface: #E7E9E2;
      --border: #C6CAC0;
      --rule: #1B1D19;
      --text: #191C18;
      --muted: #6A6F65;
      --accent: #3A6558;
      --accent-pale: #C6D8D3;
      --accent-border: #7AB0A4;
      --stamp: #8A4C34;
      --font-mono: "Courier Prime", "Courier New", Courier, monospace;
      --font-serif: "Lora", Georgia, serif;
      --font-display: "Playfair Display", Georgia, serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121519;
        --surface: #1A1E22;
        --border: #282D31;
        --rule: #D8DDD8;
        --text: #DCE1DC;
        --muted: #787E78;
        --accent: #78B8AB;
        --accent-pale: #182824;
        --accent-border: #3D7068;
        --stamp: #C07A5A;
      }
    }

    html { font-size: 17px; }
    body {
      font-family: var(--font-serif);
      background: var(--bg);
      color: var(--text);
      line-height: 1.72;
      -webkit-font-smoothing: antialiased;
    }

    /* ── MASTHEAD ───────────────────────────── */
    .site-header {
      border-top: 3px solid var(--rule);
    }
    .masthead-row {
      max-width: 760px;
      margin: 0 auto;
      padding: 0.6rem 1.5rem 0.55rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
    }
    .logo {
      font-family: var(--font-mono);
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
    }
    .masthead-date {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .nav-strip {
      border-top: 1px solid var(--border);
      border-bottom: 2px solid var(--rule);
      padding: 0.45rem 1.5rem;
    }
    .nav-strip nav {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      gap: 1.75rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .nav-strip a {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
    }
    .nav-strip a:hover { color: var(--accent); }
    .nav-strip a.active {
      color: var(--text);
      border-bottom: 1.5px solid var(--text);
    }

    /* ── PAGE ───────────────────────────────── */
    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 1.75rem 1.5rem 5rem;
    }

    /* ── TYPOGRAPHY ─────────────────────────── */
    h1 {
      font-family: var(--font-display);
      font-size: 2.1rem;
      font-weight: 400;
      letter-spacing: -0.025em;
      line-height: 1.15;
      margin-bottom: 0.2rem;
      text-wrap: balance;
    }
    h2 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      line-height: 1.32;
      margin: 2rem 0 0.65rem;
      text-wrap: balance;
    }
    h3 {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 400;
      margin: 1.5rem 0 0.4rem;
    }
    p { margin-bottom: 0.9rem; max-width: 68ch; }
    p:last-child { margin-bottom: 0; }
    ul, ol { padding-left: 1.4rem; margin-bottom: 0.85rem; }
    li { margin-bottom: 0.25rem; }
    a { color: var(--accent); }
    a:hover { text-decoration: underline; }
    code {
      font-family: var(--font-mono);
      font-size: 0.83em;
      background: var(--surface);
      padding: 0.1em 0.35em;
      border: 1px solid var(--border);
    }
    hr { border: none; border-top: 1px solid var(--border); margin: 1.75rem 0; }

    /* ── META BAR ───────────────────────────── */
    .meta {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-bottom: 1.75rem;
      padding-bottom: 1.1rem;
      border-bottom: 1px solid var(--border);
    }
    .meta span + span::before { content: " · "; }

    /* ── DIGEST BODY (Markdown-rendered content) ── */
    .digest-body h2 {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: normal;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      border-top: 2px solid var(--text);
      padding-top: 0.55rem;
      margin: 2.2rem 0 1.2rem;
    }
    .digest-body h3 {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      line-height: 1.32;
      margin: 0 0 0.7rem;
      text-wrap: balance;
    }

    /* ── DEEP DIVE (JS-injected wrapper around h3 blocks) ── */
    .deep-dive {
      background: var(--accent-pale);
      border-left: 3px solid var(--accent-border);
      padding: 1.1rem 1.4rem 1.1rem 1.2rem;
      margin-bottom: 1.25rem;
    }
    .deep-dive p { font-size: 0.97rem; }
    .deep-dive p:last-child { margin-bottom: 0; }

    /* ── BRIEF LIST (JS-injected class on ul) ── */
    .brief-list { list-style: none; padding: 0; }
    .brief-list li {
      padding: 0.72rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.95rem;
      line-height: 1.56;
      max-width: 68ch;
    }
    .brief-list li:last-child { border-bottom: none; }

    /* ── DAY NAV ────────────────────────────── */
    .day-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.75rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .day-nav a { color: var(--accent); text-decoration: none; }
    .day-nav a:hover { text-decoration: underline; }

    /* ── ARCHIVE LIST ───────────────────────── */
    .archive-list { list-style: none; padding: 0; border-top: 2px solid var(--text); }
    .archive-list li {
      display: flex;
      gap: 1.5rem;
      align-items: baseline;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
    }
    .archive-list li:last-child { border-bottom: none; }
    .archive-list .date {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      min-width: 6rem;
      flex-shrink: 0;
      letter-spacing: 0.04em;
    }
    .archive-list a { color: var(--text); font-size: 0.93rem; text-decoration: none; }
    .archive-list a:hover { color: var(--accent); }

    /* ── STREAM CARDS ───────────────────────── */
    .stream-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 0;
      border-top: 2px solid var(--text);
    }
    .stream-card {
      padding: 1.1rem 2rem 1.1rem 0;
      border-bottom: 1px solid var(--border);
    }
    .stream-card h2 {
      font-size: 1rem;
      margin-top: 0;
      margin-bottom: 0.2rem;
      font-weight: 400;
    }
    .stream-card h2 a { color: var(--text); text-decoration: none; }
    .stream-card h2 a:hover { color: var(--accent); }
    .stream-card .last-updated {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .stream-card .last-updated a { color: var(--accent); text-decoration: none; }

    /* ── SOURCES ────────────────────────────── */
    details {
      margin-top: 2.5rem;
      border-top: 1px solid var(--border);
      padding-top: 0.75rem;
    }
    details summary {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      list-style: none;
    }
    details[open] summary { margin-bottom: 0.6rem; }
    .source-list { list-style: none; padding: 0; margin-top: 0.4rem; }
    .source-list li {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      line-height: 1.7;
      color: var(--muted);
    }
    .source-list a { color: var(--accent); text-decoration: none; }
    .source-list a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="masthead-row">
      <a href="../index.html" class="logo">Uutisvirta</a>
      <span class="masthead-date" id="site-date"></span>
    </div>
    <div class="nav-strip">
      <nav>
        
        <a href="../ammatillinen-osaaminen/index.html"
           class="active">
          Ammatillinen osaaminen
        </a>
        
        <a href="../era/index.html"
           >
          Erä
        </a>
        
        <a href="../politiikka/index.html"
           >
          Politiikka
        </a>
        
      </nav>
    </div>
  </header>
  <main class="page">
    
<h1>Ammatillinen osaaminen</h1>
<p class="meta"><span>1 julkaisua</span></p>


<ul class="archive-list">
  
  <li>
    <span class="date">2026-07-22</span>
    <a href="2026-07-22.html">2026-07-22</a>
  </li>
  
</ul>


  </main>
  <script>
    (function() {
      var d = new Date();
      var days = ['Su','Ma','Ti','Ke','To','Pe','La'];
      var months = ['tammik.','helmik.','maalisk.','huhtik.','toukok.','kesäk.','heinäk.','elok.','syysk.','lokak.','marrask.','jouluk.'];
      var el = document.getElementById('site-date');
      if (el) el.textContent = days[d.getDay()] + ' ' + d.getDate() + '. ' + months[d.getMonth()] + ' ' + d.getFullYear();

      document.querySelectorAll('a[href]').forEach(function(a) {
        var href = a.getAttribute('href');
        if (href && href.startsWith('http')) {
          a.setAttribute('target', '_blank');
          a.setAttribute('rel', 'noopener');
        }
      });
    })();
  </script>
</body>
</html>
