name: Daily Digest

on:
  schedule:
    # UTC+2 (EET talvi) = 07:00, UTC+3 (EEST kesä) = 08:00 Helsingissä.
    # Github Actions -ajastin on epätarkka, ±15 min viive on normaalia.
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write  # gh-pages-haaran push
  pages: write     # Pages-deployment
  id-token: write  # OIDC-autentikointi deploy-pages-actionia varten

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout koodi (main)
        uses: actions/checkout@v4

      # gh-pages-haara checkataan output/-kansioon, jotta vanhat digestit säilyvät.
      - name: Checkout gh-pages output/-kansioon
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: output

      - name: Asenna Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Asenna uv ja riippuvuudet
        run: |
          pip install uv
          uv pip install --system -e .

      - name: Aja Uutisvirta
        env:
          LLM_PROVIDER: openai
          OPENAI_MODEL: gpt-4o
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uutisvirta --force

      # Commitoi uudet tiedostot gh-pages-haaraan historian säilyttämiseksi.
      - name: Commitoi ja pushi gh-pages
        working-directory: output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Digest $(date -u +%Y-%m-%d)"
          git push

      # Pakkaa output/-kansio artifaktiksi deploy-jobbia varten.
      - name: Pakkaa sivusto Pages-artifaktiksi
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # deploy-pages käyttää OIDC-tokenia eikä ole riippuvainen branch-pushin triggerista,
      # joten GITHUB_TOKEN-rajoitus ei koske sitä.
      - name: Julkaise GitHub Pagesiin
        id: deployment
        uses: actions/deploy-pages@v4
